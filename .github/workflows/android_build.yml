name: Gerar meu Aplicativo
on: [push, workflow_dispatch]
jobs:
  construir:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8' # O Android 29 ama essa versão
      - name: Instalando e Criando
        run: |
          npm install -g cordova@10.0.0 --no-audit
          cordova platform add android@9.1.0 --no-telemetry --no-fetch || true
          cordova build android --debug --no-telemetry --device
      - name: Pegar o APK
        uses: actions/upload-artifact@v4
        with:
          name: meu-app-resultado
          path: "platforms/android/app/build/outputs/apk/debug/*.apk"
