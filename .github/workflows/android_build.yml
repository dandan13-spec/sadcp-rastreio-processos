name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configurar Java 17 (Exigido pelo Gradle 9)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Instalar Cordova
        run: npm install -g cordova

      - name: Criar APK (Build)
        run: cordova build android --debug --no-telemetry
        env:
          # Aqui está o segredo: o Gradle usará o 17 para rodar, 
          # mas o Cordova tentará usar o que estiver no PATH.
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
