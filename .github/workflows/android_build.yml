name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Lição 1: O Java 17 é necessário para as ferramentas do Android (SDK), 
      # mas o build precisa do Java 11. Vamos instalar o 11 como padrão.
      - name: Configurar Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Instalar Node.js e Cordova
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install Cordova
        run: npm install -g cordova

      # Lição 2: Não vamos deixar o GitHub usar o Gradle 9 dele.
      # Vamos limpar a plataforma e forçar o Cordova a baixar a versão correta (7.4.2).
      - name: Build APK
        run: |
          cordova platform add android@11.0.0 --non-interactive
          
          # Criamos um arquivo de propriedades para travar a versão do Gradle antes do build
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-7.4.2-all.zip" > platforms/android/gradle/wrapper/gradle-wrapper.properties
          
          # Rodamos o build ignorando o Gradle do sistema
          cordova build android --debug --no-telemetry -- --gradleArg=-Dorg.gradle.java.home=$JAVA_HOME
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_11_X64 }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
