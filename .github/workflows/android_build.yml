name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configurar Java 11 e 17
        uses: actions/setup-java@v4
        with:
          java-version: |
            11
            17
          distribution: 'temurin'

      - name: Instalar Build Tools 32.0.0 (Usando Java 17)
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "build-tools;32.0.0" "platforms;android-32"
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}

      - name: Instalar Node.js e Cordova
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install Cordova
        run: npm install -g cordova

      - name: Build APK (Usando Java 11 e Gradle 7.4.2)
        run: |
          cordova platform rm android --nosave || echo "Limpo"
          cordova platform add android@11.0.0 --non-interactive
          CORDOVA_ANDROID_GRADLE_DISTRIBUTION_URL="https://services.gradle.org/distributions/gradle-7.4.2-all.zip" cordova build android --debug --no-telemetry
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_11_X64 }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
