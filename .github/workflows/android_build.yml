name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Instalamos as duas versões necessárias
      - name: Configurar Java 11 e 17
        uses: actions/setup-java@v4
        with:
          java-version: |
            11
            17
          distribution: 'temurin'

      # PASSO 1: Usar Java 17 para baixar as ferramentas (Evita o erro de Linkage)
      - name: Instalar Android Build Tools 32
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "build-tools;32.0.0" "platforms;android-32"
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}

      - name: Setup Gradle 7.4.2
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 7.4.2

      - name: Instalar Node.js e Cordova
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install Cordova
        run: npm install -g cordova

      # PASSO 2: Usar Java 11 para o Build (Evita o erro do Gradle)
      - name: Build APK
        run: |
          cordova platform add android@11.0.0 --non-interactive
          cordova build android --debug --no-telemetry --device
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_11_X64 }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
