ame: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configurar Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      # Esta Action prepara o Gradle 7.4.2 corretamente no sistema
      - name: Setup Gradle 7.4.2
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 7.4.2

      - name: Instalar Node.js e Cordova
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install Cordova
        run: npm install -g cordova

      - name: Build APK
        run: |
          # Adiciona a plataforma
          cordova platform add android@11.0.0 --non-interactive
          
          # O segredo: dizemos ao Cordova para NÃO baixar o Gradle, 
          # e sim usar o que acabamos de configurar no passo anterior.
          cordova build android --debug --no-telemetry --device
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_11_X64 }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
