name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Gradle 8.7 (Compatível com Cordova)
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.7

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Instalar Cordova
        run: npm install -g cordova

      - name: Adicionar Plataforma Android
        run: |
          cordova platform add android --non-interactive || echo "Plataforma já existe"

      - name: Criar APK (Build)
        run: cordova build android --debug --no-telemetry
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
