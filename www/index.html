<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SADCP - Rastreio de Processos</title>

<style>
body {
    font-family: Arial;
    background: #f0f4f8;
    margin: 0;
}

.header {
    background: #003366;
    color: white;
    padding: 15px;
    text-align: center;
}

.logo {
    width: 120px;
    margin-bottom: 10px;
}

.subtitulo {
    font-size: 14px;
    opacity: 0.9;
}

.container {
    padding: 20px;
}

input, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
}

.card {
    background: white;
    padding: 15px;
    margin-top: 15px;
    border-radius: 10px;
}

.linha {
    border-bottom: 1px solid #ddd;
    padding: 5px 0;
}

.titulo {
    font-weight: bold;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="header">
    <img src="img/logo.png" class="logo">
    <h2>Prefeitura de Betim</h2>
    <div class="subtitulo">SADCP - Secretaria Adjunta de Convênios e Parcerias</div>
</div>

<div class="container">

<input id="numero" placeholder="Digite o número do processo">
<button onclick="buscar()">Consultar</button>

<div id="resultado"></div>

</div>

<script>
const url = "https://docs.google.com/spreadsheets/d/1ckWKeaGtgwrNTehuP4jVN9MeTAYdqEAS/export?format=csv";

function limpar(valor) {
    return valor.replace(/"/g, "").trim();
}

function normalizar(valor) {
    return valor.replace(/\D/g, '');
}

async function buscar() {

    const numeroInput = normalizar(document.getElementById("numero").value);

    const res = await fetch(url);
    const text = await res.text();

    const linhas = text.split("\n");

    let historico = [];
    let nomeProcesso = "";

    for (let i = 1; i < linhas.length; i++) {

        const col = linhas[i].split(",");

        if (!col || col.length < 4) continue;

        const numero = normalizar(limpar(col[0]));

        if (numero === numeroInput) {

            nomeProcesso = limpar(col[1]);

            historico.push({
                status: limpar(col[2]),
                data: limpar(col[3])
            });
        }
    }

    if (historico.length === 0) {
        document.getElementById("resultado").innerHTML =
            "<div class='card'>❌ Processo não encontrado</div>";
        return;
    }

    historico.reverse();

    let html = `
    <div class="card">
        <div class="titulo">${nomeProcesso}</div>
        <div><b>Processo:</b> ${document.getElementById("numero").value}</div>
        <br>
        <div class="titulo">📜 Histórico</div>
    `;

    historico.forEach(item => {
        html += `
        <div class="linha">
            <b>${item.data}</b> — ${item.status}
        </div>
        `;
    });

    html += </div>;

    document.getElementById("resultado").innerHTML = html;
}
</script>

</body>
</html>
